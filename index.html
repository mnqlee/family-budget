const fmt    = n => new Intl.NumberFormat("en-US",{style:"currency",currency:"USD",maximumFractionDigits:0}).format(n||0);

// ─── FIREBASE SYNC (REST API — no SDK needed) ────────────────
const FIREBASE_URL = "https://family-budget-1f7f3-default-rtdb.firebaseio.com";

async function cloudGet(hid) {
  try {
    const r = await fetch(`${FIREBASE_URL}/households/${hid}.json`);
    if (!r.ok) return null;
    const data = await r.json();
    return data; // null if household doesn't exist yet
  } catch { return null; }
}
async function cloudSet(hid, data) {
  try {
    const r = await fetch(`${FIREBASE_URL}/households/${hid}.json`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ ...data, _ts: Date.now() }),
    });
    return r.ok;
  } catch { return false; }
}
function useStorage(key,init) {
  const [val,setVal]=useState(()=>{ try{const s=localStorage.getItem(key);return s?JSON.parse(s):(typeof init==="function"?init():init);}catch{return typeof init==="function"?init():init;} });
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch{}},[key,val]);
  return [val,setVal];
}
function genHID(){return Math.random().toString(36).slice(2,8).toUpperCase();}

function computeAlerts({alloc,spentByCat,categories,periodProgress,income,totalAlloc}){
  const alerts=[];
  categories.forEach(cat=>{
    const b=parseFloat(alloc[cat.id])||0;
    const s=spentByCat[cat.id]||0;
    if(b<=0)return;
    const sp=s/b; const tp=periodProgress;
    if(s>b) alerts.push({level:"critical",catId:cat.id,icon:"🚨",color:"#E07A5F",title:`${cat.icon} ${cat.label} is over budget`,detail:`${fmtDec(s-b)} over — spent ${fmtDec(s)} of ${fmtDec(b)}.`});
    else if(sp>=0.9) alerts.push({level:"warning",catId:cat.id,icon:"⚠️",color:"#E07A5F",title:`${cat.icon} ${cat.label} almost empty`,detail:`Only ${fmtDec(b-s)} left (${Math.round((1-sp)*100)}%).`});
    else if(sp>tp+0.25&&sp<0.9) alerts.push({level:"watch",catId:cat.id,icon:"⚡",color:"#D4A017",title:`${cat.icon} ${cat.label} spending fast`,detail:`${Math.round(sp*100)}% spent, ${Math.round(tp*100)}% through period. Projected: ${fmtDec(b>0?(s/Math.max(tp,.01)):0)}.`});
    else if(Math.abs(sp-tp)<=0.10&&sp>0.1) alerts.push({level:"good",catId:cat.id,icon:"✅",color:"#74C69D",title:`${cat.icon} ${cat.label} on track`,detail:`${Math.round(sp*100)}% spent, ${Math.round(tp*100)}% through period.`});
  });
  const unassigned=income-totalAlloc;
  if(income>0&&unassigned<0) alerts.push({level:"critical",icon:"🚨",color:"#E07A5F",title:"Budget over-allocated",detail:`${fmtDec(Math.abs(unassigned))} more allocated than your paycheck.`});
  else if(income>0&&unassigned>0&&unassigned<income*0.05) alerts.push({level:"good",icon:"🎯",color:"#74C69D",title:"Nearly every dollar assigned",detail:`${fmtDec(unassigned)} left to assign.`});
  const order={critical:0,warning:1,watch:2,good:3};
  return alerts.sort((a,b)=>order[a.level]-order[b.level]);
}

function BackupModal({getBundle,applyBundle,onClose}){
  const [tab,setTab]=useState("export");
  const [importText,setImportText]=useState("");
  const [importErr,setImportErr]=useState("");
  const [exported,setExported]=useState(false);

  const doExport=()=>{
    const data=getBundle();
    const json=JSON.stringify({_v:"hb4",_exported:new Date().toISOString(),...data},null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download=`family-budget-backup-${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
    setExported(true);
  };

  const doCopy=()=>{
    const data=getBundle();
    const json=JSON.stringify({_v:"hb4",_exported:new Date().toISOString(),...data},null,2);
    navigator.clipboard.writeText(json).then(()=>setExported(true));
  };

  const doImport=()=>{
    setImportErr("");
    try{
      const parsed=JSON.parse(importText.trim());
      if(parsed._v!=="hb4"){setImportErr("Not a valid Family Budget backup file.");return;}
      const{_v,_exported,...bundle}=parsed;
      applyBundle(bundle);
      onClose();
    }catch(e){
      setImportErr("Invalid JSON — check the file and try again.");
    }
  };

  return(
    <Modal title="💾 Backup &amp; Restore" onClose={onClose}>
      <div style={{display:"flex",gap:5,marginBottom:13}}>
        <button onClick={()=>setTab("export")} style={{...S.periodBtn,...(tab==="export"?S.periodBtnActive:{}),flex:1}}>Export</button>
        <button onClick={()=>setTab("import")} style={{...S.periodBtn,...(tab==="import"?S.periodBtnActive:{}),flex:1}}>Import / Restore</button>
      </div>

      {tab==="export"&&(<>
        <div style={{...S.card,borderColor:"#74C69D",marginBottom:11}}>
          <div style={{fontSize:12,color:"#E8E0D0",fontWeight:"bold",marginBottom:4}}>Your data is safe</div>
          <div style={{fontSize:11,color:"#7A8B7A",lineHeight:1.6}}>
            Export a full JSON backup of all your budget data — paychecks, transactions, categories, debts, goals, everything. When I update the app, your data stays in localStorage automatically. But a backup means if anything ever goes wrong, you can restore in 10 seconds.
          </div>
        </div>
        <button onClick={doExport} style={{...S.btnPrimary,width:"100%",padding:11,fontSize:13,marginBottom:8}}>
          ⬇️ Download Backup File
        </button>
        <button onClick={doCopy} style={{...S.btnGhost,width:"100%",padding:11,fontSize:13}}>
          📋 Copy to Clipboard
        </button>
        {exported&&<div style={{textAlign:"center",color:"#74C69D",fontSize:12,marginTop:9}}>✓ Backup ready — save it somewhere safe</div>}
      </>)}

      {tab==="import"&&(<>
        <div style={{...S.card,borderColor:"#D4A017",marginBottom:11}}>
          <div style={{fontSize:11,color:"#D4A017",fontWeight:"bold",marginBottom:3}}>⚠️ This will overwrite current data</div>
          <div style={{fontSize:11,color:"#7A8B7A",lineHeight:1.5}}>Paste your backup JSON below. All current data will be replaced with the backup. Make sure you're restoring the right file.</div>
        </div>
        <div style={S.microLabel}>Paste backup JSON</div>
        <textarea
          value={importText}
          onChange={e=>{setImportText(e.target.value);setImportErr("");}}
          placeholder={'{\n  "_v": "hb4",\n  ...\n}'}
          style={{...S.input,height:130,resize:"vertical",fontFamily:"monospace",fontSize:10,marginBottom:8}}
        />
        {importErr&&<div style={{color:"#E07A5F",fontSize:11,marginBottom:7}}>⚠️ {importErr}</div>}
        <button
          onClick={doImport}
          disabled={!importText.trim()}
          style={{...S.btnPrimary,width:"100%",padding:11,fontSize:13,opacity:importText.trim()?1:.4}}>
          ⬆️ Restore from Backup
        </button>
      </>)}
    </Modal>
  );
}

function App(){
  const today=new Date();
  const [year,setYear]=useState(today.getFullYear());
  const [month,setMonth]=useState(today.getMonth()+1);
  const [period,setPeriod]=useState(today.getDate()<=15?1:2);
  const [householdId,setHouseholdId]=useStorage("hb4_household","");
  const [deviceName,setDeviceName]=useStorage("hb4_device","");
  const [syncEnabled,setSyncEnabled]=useStorage("hb4_syncEnabled",false);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [lastSync,setLastSync]=useState(null);
  const [paychecks,setPaychecks]=useStorage("hb4_paychecks",{});
  const [allocations,setAllocations]=useStorage("hb4_allocations",{});
  const [transactions,setTransactions]=useStorage("hb4_transactions",[]);
  const [categories,setCategories]=useStorage("hb4_categories",DEFAULT_CATEGORIES);
  const [billChecks,setBillChecks]=useStorage("hb4_billchecks",{});
  const [sinkingFunds,setSinkingFunds]=useStorage("hb4_sinking",DEFAULT_SINKING);
  const [savingsGoals,setSavingsGoals]=useStorage("hb4_savingsgoals",[]);
  const [netWorth,setNetWorth]=useStorage("hb4_networth",[]);
  const [periodNotes,setPeriodNotes]=useStorage("hb4_periodnotes",{});
  const [recurringBills,setRecurring]=useStorage("hb4_recurring",[]);
  const [debts,setDebts]=useStorage("hb4_debts",[]);
  const [annualExpenses,setAnnualExpenses]=useStorage("hb4_annual",ANNUAL_EXPENSES_DEFAULT);
  const [lineNotes,setLineNotes]=useStorage("hb4_linenotes",{});
  const [givingLog,setGivingLog]=useStorage("hb4_giving",{goal:0,entries:[]});
  const [windfalls,setWindfalls]=useStorage("hb4_windfalls",[]);
  const [view,setView]=useState("budget");
  const [toast,setToast]=useState(null);
  const [modal,setModal]=useState(null);
  const [alertsExpanded,setAlertsExpanded]=useState(false);
  const pendingPush=useRef(false);

  const pk=pKey(year,month,period);
  const income=paychecks[pk]||0;
  const alloc=allocations[pk]||{};
  const periodTxs=transactions.filter(t=>t.pk===pk);
  const totalAlloc=Object.values(alloc).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const unassigned=income-totalAlloc;
  const totalSpent=periodTxs.reduce((a,t)=>a+t.amount,0);
  const spentByCat={};
  periodTxs.forEach(t=>{spentByCat[t.catId]=(spentByCat[t.catId]||0)+t.amount;});
  const periodLabel=period===1?`${MONTHS[month-1]} 1–15`:`${MONTHS[month-1]} 16–${new Date(year,month,0).getDate()}`;
  const mk1=pKey(year,month,1),mk2=pKey(year,month,2);
  const monthIncome=(paychecks[mk1]||0)+(paychecks[mk2]||0);
  const monthTxs=transactions.filter(t=>t.pk===mk1||t.pk===mk2);
  const monthAlloc=Object.values({...(allocations[mk1]||{}),...(allocations[mk2]||{})}).reduce((a,b)=>a+(parseFloat(b)||0),0);
  const margin=monthIncome>0?(monthIncome-monthAlloc)/monthIncome:0;
  const riskScore=margin<0?100:margin<0.05?85:margin<0.1?65:margin<0.2?40:margin<0.3?20:10;
  const daysInPeriod=period===1?15:new Date(year,month,0).getDate()-15;
  const dayOfMonth=today.getMonth()+1===month&&today.getFullYear()===year?today.getDate():(period===1?15:new Date(year,month,0).getDate());
  const daysElapsed=period===1?Math.min(dayOfMonth,15):Math.max(0,Math.min(dayOfMonth-15,daysInPeriod));
  const periodProgress=daysInPeriod>0?daysElapsed/daysInPeriod:1;
  const prevPk=period===2?mk1:pKey(year,month===1?12:month-1,2);
  const prevAlloc=allocations[prevPk]||{};
  const prevSpent={};
  transactions.filter(t=>t.pk===prevPk).forEach(t=>{prevSpent[t.catId]=(prevSpent[t.catId]||0)+t.amount;});
  const rolloverByCat={};
  Object.entries(prevAlloc).forEach(([cid,b])=>{const s=(parseFloat(b)||0)-(prevSpent[cid]||0);if(s>0)rolloverByCat[cid]=s;});
  const alerts=computeAlerts({alloc,spentByCat,categories,periodProgress,income,totalAlloc});
  const criticalAlerts=alerts.filter(a=>a.level==="critical"||a.level==="warning");

  const getBundle=useCallback(()=>({paychecks,allocations,transactions,categories,billChecks,sinkingFunds,savingsGoals,netWorth,periodNotes,recurringBills,debts,annualExpenses,lineNotes,givingLog,windfalls}),[paychecks,allocations,transactions,categories,billChecks,sinkingFunds,savingsGoals,netWorth,periodNotes,recurringBills,debts,annualExpenses,lineNotes,givingLog,windfalls]);
  const applyBundle=useCallback((b)=>{
    if(!b)return;
    if(b.paychecks)setPaychecks(b.paychecks);
    if(b.allocations)setAllocations(b.allocations);
    if(b.categories)setCategories(b.categories);
    if(b.billChecks)setBillChecks(b.billChecks);
    if(b.sinkingFunds)setSinkingFunds(b.sinkingFunds);
    if(b.savingsGoals)setSavingsGoals(b.savingsGoals);
    if(b.netWorth)setNetWorth(b.netWorth);
    if(b.periodNotes)setPeriodNotes(b.periodNotes);
    if(b.recurringBills)setRecurring(b.recurringBills);
    if(b.debts)setDebts(b.debts);
    if(b.annualExpenses)setAnnualExpenses(b.annualExpenses);
    if(b.lineNotes)setLineNotes(b.lineNotes);
    if(b.givingLog)setGivingLog(b.givingLog);
    if(b.windfalls)setWindfalls(b.windfalls);
    if(b.transactions){
      setTransactions(prev=>{
        const merged=[...b.transactions];
        prev.forEach(t=>{if(!merged.find(r=>r.id===t.id))merged.push(t);});
        return merged.sort((a,b2)=>b2.id-a.id);
      });
    }
  },[]);

  const pushSync=useCallback(async()=>{
    if(!householdId||!syncEnabled)return;
    setSyncStatus("syncing");
    const ok=await cloudSet(householdId,getBundle());
    setSyncStatus(ok?"ok":"err");
    if(ok)setLastSync(Date.now());
  },[householdId,syncEnabled,getBundle]);

  const pullSync=useCallback(async()=>{
    if(!householdId||!syncEnabled)return;
    const remote=await cloudGet(householdId);
    if(!remote)return;
    applyBundle(remote);
    setLastSync(Date.now());setSyncStatus("ok");
  },[householdId,syncEnabled,applyBundle]);

  useEffect(()=>{
    if(!householdId||!syncEnabled)return;
    const id=setInterval(pullSync,6000);
    return()=>clearInterval(id);
  },[householdId,syncEnabled,pullSync]);

  useEffect(()=>{
    if(!householdId||!syncEnabled)return;
    if(pendingPush.current)return;
    pendingPush.current=true;
    const t=setTimeout(()=>{pushSync();pendingPush.current=false;},1500);
    return()=>{clearTimeout(t);pendingPush.current=false;};
  },[paychecks,allocations,transactions,categories,billChecks,sinkingFunds,savingsGoals,netWorth,periodNotes,recurringBills,debts,annualExpenses,lineNotes,givingLog,windfalls]);

  const notify=(msg,type="ok")=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);};
  const saveIncome=v=>{const n=parseFloat(v);if(isNaN(n)||n<=0){notify("Enter valid amount","err");return false;}setPaychecks(p=>({...p,[pk]:n}));return true;};
  const setAlloc=(catId,v)=>setAllocations(p=>({...p,[pk]:{...(p[pk]||{}),[catId]:parseFloat(v)||0}}));
  const addTx=tx=>setTransactions(p=>[{...tx,id:Date.now(),pk},...p]);
  const deleteTx=id=>setTransactions(p=>p.filter(t=>t.id!==id));
  const updateTx=(id,ch)=>setTransactions(p=>p.map(t=>t.id===id?{...t,...ch}:t));
  const toggleBillPaid=billId=>setBillChecks(p=>({...p,[pk]:{...(p[pk]||{}),[billId]:!(p[pk]||{})[billId]}}));
  const copyLastPeriod=()=>{
    const la=allocations[prevPk];
    if(!la||Object.keys(la).length===0){notify("No previous period found","err");return;}
    setAllocations(p=>({...p,[pk]:{...la,...(p[pk]||{})}}));
    notify("Last period copied ✓");
  };
  useEffect(()=>{
    if(!income||!recurringBills.length)return;
    recurringBills.filter(r=>r.period===period||r.period===0).forEach(r=>{
      setAllocations(p=>{if((p[pk]||{})[r.catId]!==undefined)return p;return{...p,[pk]:{...(p[pk]||{}),[r.catId]:r.amount}};});
    });
  },[pk,income]);

  const shiftPeriod=dir=>{let np=period+dir,ny=year,nm=month;if(np<1){np=2;nm--;if(nm<1){nm=12;ny--;}}if(np>2){np=1;nm++;if(nm>12){nm=1;ny++;}}setYear(ny);setMonth(nm);setPeriod(np);};
  const syncDot=syncEnabled?syncStatus==="ok"?"#74C69D":syncStatus==="syncing"?"#D4A017":syncStatus==="err"?"#E07A5F":"#555":"#555";
  const TABS=[["budget","📋","Budget"],["spending","💳","Spending"],["summary","📊","Month"],["goals","🎯","Goals"],["debt","📉","Debt"],["networth","📈","Wealth"],["plan","🔮","Planner"]];

  return(
    <div style={S.root}>
      <div style={S.header}>
        <div style={S.headerTop}>
          <div><div style={S.appTag}>Every Dollar Has A Home</div><div style={S.appTitle}>Family Budget</div></div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <button onClick={()=>setModal("backup")} style={{...S.syncBtn,marginRight:3}} title="Backup / Restore">
              <span style={{fontSize:11,color:"#7A8B7A"}}>💾</span>
            </button>
            <button onClick={()=>setModal("sync")} style={S.syncBtn}>
              <span style={{width:7,height:7,borderRadius:"50%",background:syncDot,display:"inline-block",marginRight:5,flexShrink:0}}/>
              <span style={{fontSize:10,color:syncEnabled?"#74C69D":"#555"}}>{syncEnabled?`🏠 ${householdId}`:"Sync"}</span>
            </button>
            <div style={S.periodNav}>
              <button onClick={()=>shiftPeriod(-1)} style={S.navArrow}>‹</button>
              <span style={S.periodNavLabel}>{periodLabel}</span>
              <button onClick={()=>shiftPeriod(1)} style={S.navArrow}>›</button>
            </div>
          </div>
        </div>
        <div style={S.tabs}>
          {TABS.map(([v,ic,l])=>(
            <button key={v} onClick={()=>setView(v)} style={{...S.tab,...(view===v?S.tabActive:{})}}>
              <span style={{fontSize:13}}>{ic}</span><span style={{fontSize:10,marginLeft:3}}>{l}</span>
              {v==="budget"&&criticalAlerts.length>0&&<span style={{background:"#E07A5F",color:"#fff",borderRadius:"50%",fontSize:9,width:14,height:14,display:"inline-flex",alignItems:"center",justifyContent:"center",marginLeft:4}}>{criticalAlerts.length}</span>}
            </button>
          ))}
        </div>
      </div>

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}

      {riskScore>=65&&income>0&&(
        <div style={{...S.ribbon,background:riskScore>=85?"#3D1F18":"#332A0A"}}>
          <span style={{color:riskScore>=85?"#E07A5F":"#D4A017",fontWeight:"bold",fontSize:11}}>{riskScore>=85?"🚨 Budget Risk High":"⚡ Thin Margin"}</span>
          <span style={{color:"#7A8B7A",fontSize:11,marginLeft:6}}>{riskScore>=85?"Under 5% margin — one surprise breaks the budget":"Budget margin is tight this month"}</span>
        </div>
      )}

      <IncomeBanner income={income} totalAlloc={totalAlloc} unassigned={unassigned}
        totalSpent={totalSpent} periodLabel={periodLabel} periodProgress={periodProgress}
        onEdit={()=>setModal("income")} onCopyLast={copyLastPeriod}
        alerts={alerts} alertsExpanded={alertsExpanded} setAlertsExpanded={setAlertsExpanded}/>

      <div style={S.body}>
        {view==="budget"&&<BudgetView pk={pk} income={income} alloc={alloc} spentByCat={spentByCat}
          rolloverByCat={rolloverByCat} categories={categories} periodProgress={periodProgress}
          billChecks={billChecks[pk]||{}} onToggleBill={toggleBillPaid}
          onSetAlloc={setAlloc} onAddCat={()=>setModal("addcat")}
          onDeleteCat={id=>{setCategories(p=>p.filter(c=>c.id!==id));notify("Removed");}}
          onEditCat={(id,label,icon)=>{setCategories(p=>p.map(c=>c.id===id?{...c,label,icon}:c));notify("Updated ✓");}}
          onAddRecurring={()=>setModal("addrecurring")}
          periodNotes={periodNotes[pk]||""} onNotesChange={v=>setPeriodNotes(p=>({...p,[pk]:v}))}
          lineNotes={lineNotes[pk]||{}} onLineNote={(cid,v)=>setLineNotes(p=>({...p,[pk]:{...(p[pk]||{}),[cid]:v}}))}
          alerts={alerts} notify={notify}/>}
        {view==="spending"&&<SpendingView periodTxs={periodTxs} categories={categories}
          period={period} setPeriod={setPeriod} onAdd={()=>setModal("addtx")}
          onDelete={id=>{deleteTx(id);notify("Deleted");}} onUpdate={updateTx}/>}
        {view==="summary"&&<SummaryView year={year} month={month} monthIncome={monthIncome}
          paychecks={paychecks} allocations={allocations} monthTxs={monthTxs}
          categories={categories} transactions={transactions}/>}
        {view==="goals"&&<GoalsView sinkingFunds={sinkingFunds} setSinkingFunds={setSinkingFunds}
          savingsGoals={savingsGoals} setSavingsGoals={setSavingsGoals}
          annualExpenses={annualExpenses} setAnnualExpenses={setAnnualExpenses}
          givingLog={givingLog} setGivingLog={setGivingLog} currentMonth={month} notify={notify}/>}
        {view==="debt"&&<DebtView debts={debts} setDebts={setDebts} notify={notify}/>}
        {view==="networth"&&<WealthView netWorth={netWorth} setNetWorth={setNetWorth}
          windfalls={windfalls} setWindfalls={setWindfalls} debts={debts}
          savingsGoals={savingsGoals} monthIncome={monthIncome} notify={notify}/>}
        {view==="plan"&&<PlannerView income={income} alloc={alloc} categories={categories}
          spentByCat={spentByCat} debts={debts} sinkingFunds={sinkingFunds}
          savingsGoals={savingsGoals} monthIncome={monthIncome} riskScore={riskScore}
          periodProgress={periodProgress} transactions={transactions}/>}
      </div>

      {modal==="backup"&&<BackupModal getBundle={getBundle} applyBundle={(b)=>{applyBundle(b);notify("Data restored ✓");}} onClose={()=>setModal(null)}/>}
      {modal==="income"&&<IncomeModal income={income} periodLabel={periodLabel} onSave={v=>{if(saveIncome(v)){setModal(null);notify("Paycheck saved ✓");}}} onClose={()=>setModal(null)}/>}
      {modal==="addtx"&&<AddTxModal categories={categories} periodLabel={periodLabel} onAdd={tx=>{addTx(tx);setModal(null);notify("Transaction added ✓");}} onClose={()=>setModal(null)}/>}
      {modal==="addcat"&&<AddCatModal onAdd={(l,i,g)=>{setCategories(p=>[...p,{id:l.toLowerCase().replace(/\s+/g,"_")+"_"+Date.now(),label:l,icon:i,group:g}]);setModal(null);notify("Category added ✓");}} onClose={()=>setModal(null)}/>}
      {modal==="addrecurring"&&<AddRecurringModal categories={categories} recurringBills={recurringBills} onSave={list=>{setRecurring(list);setModal(null);notify("Recurring bills saved ✓");}} onClose={()=>setModal(null)}/>}
      {modal==="sync"&&<SyncModal householdId={householdId} deviceName={deviceName} syncEnabled={syncEnabled} lastSync={lastSync} syncStatus={syncStatus}
        onSetup={(hid,dn)=>{setHouseholdId(hid);setDeviceName(dn);setSyncEnabled(true);setModal(null);notify("Sync enabled ✓");setTimeout(()=>pushSync(),600);}}
        onJoin={async(hid,dn)=>{const r=await cloudGet(hid);if(!r){notify("Code not found","err");return;}setHouseholdId(hid);setDeviceName(dn);setSyncEnabled(true);applyBundle(r);setModal(null);notify("Joined household ✓");}}
        onDisable={()=>{setSyncEnabled(false);setModal(null);notify("Sync disabled");}}
        onClose={()=>setModal(null)}/>}
    </div>
  );
}

function IncomeBanner({income,totalAlloc,unassigned,totalSpent,periodLabel,periodProgress,onEdit,onCopyLast,alerts,alertsExpanded,setAlertsExpanded}){
  const pct=income>0?Math.min(100,(totalAlloc/income)*100):0;
  const barColor=unassigned<0?"#E07A5F":unassigned===0?"#74C69D":"#D4A017";
  const critCount=alerts.filter(a=>a.level==="critical"||a.level==="warning").length;
  const watchCount=alerts.filter(a=>a.level==="watch").length;
  return(
    <div style={S.incomeBar}>
      <div style={S.incomeBarInner}>
        <div><div style={S.microLabel}>Paycheck · {periodLabel}</div>
          <div style={S.incomeAmt}>{income?fmtDec(income):<span style={{color:"#444"}}>Not set</span>}</div></div>
        <div style={{textAlign:"right",display:"flex",flexDirection:"column",alignItems:"flex-end",gap:4}}>
          {income>0&&<><div style={S.microLabel}>Unassigned</div>
            <div style={{...S.incomeAmt,color:barColor,fontSize:18}}>{fmtDec(unassigned)}</div></>}
          <div style={{display:"flex",gap:5}}>
            <button onClick={onCopyLast} style={{...S.btnOutline,fontSize:9}}>⎘ Copy Last</button>
            <button onClick={onEdit} style={S.btnOutline}>{income?"✏️ Edit":"＋ Paycheck"}</button>
          </div>
        </div>
      </div>
      {income>0&&<>
        <div style={{height:4,background:"#0C1520",borderRadius:4,overflow:"hidden",margin:"7px 0 2px"}}>
          <div style={{height:"100%",width:`${pct}%`,background:barColor,borderRadius:4,transition:"width .4s"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#555",marginBottom:3}}>
          <span>{fmt(totalAlloc)} budgeted · {fmt(totalSpent)} spent</span>
          <span>{Math.round(periodProgress*100)}% through period</span>
        </div>
        {unassigned===0&&<div style={S.zeroBanner}>🎉 Every dollar has a home!</div>}
      </>}
      {(critCount>0||watchCount>0)&&(
        <button onClick={()=>setAlertsExpanded(p=>!p)} style={{width:"100%",background:"transparent",border:"none",cursor:"pointer",padding:0,marginTop:5}}>
          <div style={{display:"flex",alignItems:"center",gap:5,padding:"5px 9px",background:critCount>0?"#2A1510":"#1E1A08",borderRadius:6}}>
            {critCount>0&&<span style={{background:"#E07A5F",color:"#fff",fontSize:8,padding:"2px 6px",borderRadius:9,fontWeight:"bold"}}>{critCount} ALERT{critCount>1?"S":""}</span>}
            {watchCount>0&&<span style={{background:"#D4A017",color:"#000",fontSize:8,padding:"2px 6px",borderRadius:9,fontWeight:"bold"}}>{watchCount} WATCH</span>}
            <span style={{fontSize:10,color:"#7A8B7A",flex:1,textAlign:"left",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{alerts[0]?.title}</span>
            <span style={{color:"#555",fontSize:11}}>{alertsExpanded?"▲":"▼"}</span>
          </div>
        </button>
      )}
      {alertsExpanded&&alerts.length>0&&(
        <div style={{marginTop:5,display:"grid",gap:4}}>
          {alerts.filter(a=>a.level!=="good").map((al,i)=>(
            <div key={i} style={{display:"flex",gap:8,alignItems:"flex-start",padding:"7px 9px",background:"#0C1520",borderRadius:6,borderLeft:`3px solid ${al.color}`}}>
              <span style={{fontSize:15,flexShrink:0}}>{al.icon}</span>
              <div><div style={{fontSize:11,fontWeight:"bold",color:al.color}}>{al.title}</div>
                <div style={{fontSize:10,color:"#7A8B7A",marginTop:1}}>{al.detail}</div></div>
            </div>
          ))}
          {alerts.filter(a=>a.level==="good").length>0&&(
            <div style={{fontSize:10,color:"#74C69D",padding:"3px 9px"}}>✅ {alerts.filter(a=>a.level==="good").length} categories on track</div>
          )}
        </div>
      )}
    </div>
  );
}

function BudgetView({pk,income,alloc,spentByCat,rolloverByCat,categories,periodProgress,billChecks,onToggleBill,onSetAlloc,onAddCat,onDeleteCat,onEditCat,onAddRecurring,periodNotes,onNotesChange,lineNotes,onLineNote,alerts,notify}){
  return(<>
    <button onClick={onAddRecurring} style={S.recurringBtn}>🔁 Manage Recurring Bills</button>
    {GROUPS.map(group=>{
      const cats=categories.filter(c=>c.group===group);
      const gc=GC[group];
      const groupTotal=cats.reduce((a,c)=>a+(parseFloat(alloc[c.id])||0),0);
      return(
        <div key={group} style={{marginBottom:12}}>
          <div style={{...S.groupHeader,borderColor:gc.accent}}>
            <span style={{color:gc.accent,fontWeight:"bold",fontSize:10,letterSpacing:2,textTransform:"uppercase"}}>{group}</span>
            <span style={{color:gc.accent,fontSize:10}}>{fmt(groupTotal)}</span>
          </div>
          {cats.map(cat=>(
            <BudgetRow key={cat.id} cat={cat} gc={gc}
              budgeted={parseFloat(alloc[cat.id])||0} spent={spentByCat[cat.id]||0}
              rollover={rolloverByCat[cat.id]||0} periodProgress={periodProgress}
              isBill={cat.group==="Bills"} paid={!!(billChecks[cat.id])}
              onTogglePaid={()=>onToggleBill(cat.id)}
              onSave={v=>{onSetAlloc(cat.id,v);notify("Saved ✓");}}
              onDelete={()=>onDeleteCat(cat.id)}
              onEditCat={(label,icon)=>onEditCat(cat.id,label,icon)}
              lineNote={lineNotes[cat.id]||""} onLineNote={v=>onLineNote(cat.id,v)}
              alert={alerts.find(a=>a.catId===cat.id)}/>
          ))}
        </div>
      );
    })}
    <button onClick={onAddCat} style={S.addCatBtn}>＋ Add Category</button>
    <div style={{marginTop:5}}>
      <div style={S.microLabel}>📝 Period Notes (shared)</div>
      <textarea value={periodNotes} onChange={e=>onNotesChange(e.target.value)}
        placeholder="Reminders for this pay period..." style={{...S.input,height:60,resize:"vertical",marginTop:3}}/>
    </div>
  </>);
}

function BudgetRow({cat,gc,budgeted,spent,rollover,periodProgress,isBill,paid,onTogglePaid,onSave,onDelete,onEditCat,lineNote,onLineNote,alert}){
  const [editMode,setEditMode]=useState(null); // null | "amount" | "name"
  const [val,setVal]=useState("");
  const [nameVal,setNameVal]=useState(cat.label);
  const [iconVal,setIconVal]=useState(cat.icon);
  const [showNote,setShowNote]=useState(false);
  const [noteVal,setNoteVal]=useState(lineNote);
  const amtRef=useRef();
  const nameRef=useRef();

  const saveAmount=()=>{onSave(parseFloat(val)||0);setEditMode(null);};
  const saveName=()=>{if(nameVal.trim())onEditCat(nameVal.trim(),iconVal);setEditMode(null);};

  const QUICK_ICONS=["🏠","💡","🚿","📡","📱","🛡️","🚗","📉","🔁","🛒","⛽","🍽️","👶","❤️","👕","🧴","🏦","🆘","🎯","🤝","🎉","📦","📌","🏋️","✈️","🐾","🎮","📚","🍕","💊","🎓","🔧","💻","🎁","🍷","☕"];

  const effective=budgeted+rollover;
  const remaining=effective-spent;
  const pct=effective>0?Math.min(100,(spent/effective)*100):0;
  const over=spent>effective&&effective>0;
  const barColor=over?"#E07A5F":alert&&alert.level==="watch"?"#D4A017":gc.accent;

  return(
    <div style={{...S.budgetRow,opacity:paid?.5:1,borderColor:alert&&alert.level!=="good"?alert.color:"#1A2A22"}}>

      {/* NAME EDIT MODE */}
      {editMode==="name"?(
        <div style={{marginBottom:8}}>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:7}}>
            {QUICK_ICONS.map(i=>(
              <button key={i} onClick={()=>setIconVal(i)}
                style={{fontSize:14,padding:"2px 3px",border:`2px solid ${i===iconVal?"#74C69D":"#1E3028"}`,borderRadius:4,background:"#0C1520",cursor:"pointer"}}>
                {i}
              </button>
            ))}
          </div>
          <div style={{display:"flex",gap:5}}>
            <input ref={nameRef} value={nameVal} onChange={e=>setNameVal(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter")saveName();if(e.key==="Escape")setEditMode(null);}}
              style={{...S.inlineInput,flex:1}} autoFocus/>
            <button onClick={saveName} style={S.checkBtn}>✓</button>
            <button onClick={()=>setEditMode(null)} style={S.xBtn}>✕</button>
          </div>
        </div>
      ):(
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          {isBill&&<button onClick={onTogglePaid} style={{...S.checkCircle,background:paid?"#2D6A4F":"transparent",borderColor:paid?"#40916C":gc.muted}}>{paid&&<span style={{fontSize:9,color:"#fff"}}>✓</span>}</button>}
          <span style={{fontSize:17}}>{cat.icon}</span>
          {alert&&alert.level!=="good"&&<span style={{fontSize:12,flexShrink:0}}>{alert.icon}</span>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:"bold",fontSize:12,color:paid?"#555":"#E8E0D0",textDecoration:paid?"line-through":"none",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{cat.label}</div>
            {budgeted>0&&<div style={{fontSize:9,color:"#7A8B7A",marginTop:1}}>
              {fmtDec(spent)} spent{rollover>0&&<span style={{color:"#D4A017"}}> +{fmt(rollover)} rollover</span>}
              {" · "}<span style={{color:over?"#E07A5F":"#74C69D"}}>{over?`${fmtDec(Math.abs(remaining))} over`:`${fmtDec(remaining)} left`}</span>
            </div>}
            {lineNote&&<div style={{fontSize:9,color:"#5A7A6A",fontStyle:"italic",marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>💬 {lineNote}</div>}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:3,flexShrink:0}}>
            {editMode==="amount"?(
              <div style={{display:"flex",alignItems:"center",gap:3}}>
                <span style={{color:"#7A8B7A",fontSize:12}}>$</span>
                <input ref={amtRef} type="number" value={val} onChange={e=>setVal(e.target.value)}
                  onKeyDown={e=>{if(e.key==="Enter")saveAmount();if(e.key==="Escape")setEditMode(null);}}
                  style={{...S.inlineInput,width:78}} autoFocus/>
                <button onClick={saveAmount} style={S.checkBtn}>✓</button>
                <button onClick={()=>setEditMode(null)} style={S.xBtn}>✕</button>
              </div>
            ):(
              <>
                <span style={{fontWeight:"bold",fontSize:12,color:budgeted>0?"#E8E0D0":"#444"}}>{budgeted>0?fmtDec(budgeted):<span style={{fontSize:10,color:"#333"}}>—</span>}</span>
                <button onClick={()=>setShowNote(p=>!p)} style={{...S.iconBtn,color:lineNote?"#74C69D":"#555"}} title="Note">💬</button>
                <button onClick={()=>{setNameVal(cat.label);setIconVal(cat.icon);setEditMode("name");}} style={S.iconBtn} title="Rename">🏷️</button>
                <button onClick={()=>{setVal(budgeted||"");setEditMode("amount");}} style={S.iconBtn} title="Edit amount">✏️</button>
                <button onClick={onDelete} style={S.iconBtn} title="Delete">🗑</button>
              </>
            )}
          </div>
        </div>
      )}

      {budgeted>0&&<div style={{height:3,background:"#0C1520",borderRadius:3,overflow:"hidden",marginTop:5}}><div style={{width:`${pct}%`,background:barColor,height:"100%",borderRadius:3,transition:"width .4s"}}/></div>}

      {showNote&&(

function SummaryView({year,month,monthIncome,paychecks,allocations,monthTxs,categories,transactions}){
  const mk1=pKey(year,month,1),mk2=pKey(year,month,2);
  const totalSpent=monthTxs.reduce((a,t)=>a+t.amount,0);
  const spentByCat={};monthTxs.forEach(t=>{spentByCat[t.catId]=(spentByCat[t.catId]||0)+t.amount;});
  const allocByCat={};categories.forEach(c=>{allocByCat[c.id]=(parseFloat((allocations[mk1]||{})[c.id])||0)+(parseFloat((allocations[mk2]||{})[c.id])||0);});
  const byPerson={me:0,spouse:0,both:0};monthTxs.forEach(t=>{byPerson[t.person]=(byPerson[t.person]||0)+t.amount;});
  const sr=monthIncome>0?Math.round(((monthIncome-totalSpent)/monthIncome)*100):0;
  const now=new Date();
  const trendData={};
  categories.forEach(c=>{trendData[c.id]=[];});
  for(let i=2;i>=0;i--){
    let m=now.getMonth()+1-i,y=now.getFullYear();
    if(m<1){m+=12;y--;}
    const txs=transactions.filter(t=>t.pk===pKey(y,m,1)||t.pk===pKey(y,m,2));
    categories.forEach(c=>{trendData[c.id].push(txs.filter(t=>t.catId===c.id).reduce((a,t)=>a+t.amount,0));});
  }
  return(<>
    <div style={S.statGrid}>
      <StatCard label="Total Income"  value={fmtDec(monthIncome)}            color="#74C69D"/>
      <StatCard label="Total Spent"   value={fmtDec(totalSpent)}             color="#E07A5F"/>
      <StatCard label="Remaining"     value={fmtDec(monthIncome-totalSpent)} color={monthIncome-totalSpent>=0?"#74C69D":"#E07A5F"}/>
      <StatCard label="Savings Rate"  value={`${sr}%`}                       color="#D4A017"/>
      <StatCard label="1st–15 Pay"    value={fmtDec(paychecks[mk1]||0)}     color="#A8C5DA"/>
      <StatCard label="16–End Pay"    value={fmtDec(paychecks[mk2]||0)}     color="#A8C5DA"/>
    </div>
    <div style={{marginBottom:12}}>
      <div style={S.sectionTitle}>Category Breakdown + 3-Month Trend</div>
      {categories.map(cat=>{
        const b=allocByCat[cat.id]||0,sp=spentByCat[cat.id]||0;
        const trend=trendData[cat.id]||[0,0,0];
        const avg=trend.reduce((a,v)=>a+v,0)/3;
        if(!b&&!sp&&avg===0)return null;
        const pct=b>0?Math.min(100,(sp/b)*100):100;
        const gc=GC[cat.group]||GC.Goals;
        const overAvg=sp>avg*1.15&&avg>0;
        return(
          <div key={cat.id} style={S.summaryRow}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:3,fontSize:11}}>
              <span>{cat.icon} {cat.label}</span>
              <div style={{display:"flex",gap:8,alignItems:"center"}}>
                {avg>0&&<span style={{fontSize:9,color:overAvg?"#E07A5F":"#7A8B7A"}}>avg {fmt(avg)}{overAvg?" ↑":""}</span>}
                <span style={{color:sp>b&&b>0?"#E07A5F":"#E8E0D0"}}>{fmtDec(sp)} / {fmtDec(b)}</span>
              </div>
            </div>
            <div style={{height:3,background:"#0C1520",borderRadius:3,overflow:"hidden",marginBottom:3}}>
              <div style={{width:`${pct}%`,background:pct>100?"#E07A5F":pct>80?"#D4A017":gc.accent,height:"100%",borderRadius:3}}/>
            </div>
            <div style={{display:"flex",gap:3}}>
              {trend.map((v,i)=>{
                const maxV=Math.max(...trend,1);
                return(
                  <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                    <div style={{width:"100%",height:14,display:"flex",alignItems:"flex-end"}}>
                      <div style={{width:"100%",height:`${(v/maxV)*100}%`,background:gc.accent,opacity:.45,borderRadius:2,minHeight:2}}/>
                    </div>
                    <span style={{fontSize:7,color:"#555"}}>{MO[(now.getMonth()-2+i+12)%12]}</span>
                  </div>
                );
              })}
            </div>
          </div>
        );
      })}
    </div>
    <div><div style={S.sectionTitle}>By Person</div>
      <div style={S.statGrid}>
        <StatCard label="🙋 Me"     value={fmtDec(byPerson.me)}     color="#74C69D"/>
        <StatCard label="💑 Spouse" value={fmtDec(byPerson.spouse)} color="#A8C5DA"/>
        <StatCard label="👥 Joint"  value={fmtDec(byPerson.both)}   color="#D4A017"/>
      </div>
    </div>
  </>);
}

          <div style={{display:"flex",alignItems:"center",gap:5}}><span style={{color:"#7A8B7A",fontSize:12}}>$</span><input type="number" value={givingLog.goal||""} onChange={e=>setGivingLog(p=>({...p,goal:parseFloat(e.target.value)||0}))} style={{...S.inlineInput,width:80}}/></div>
        </div>
        {givingLog.goal>0&&(()=>{
          const total=(givingLog.entries||[]).reduce((a,e)=>a+e.amount,0);
          const pct=Math.min(100,(total/givingLog.goal)*100);
          return(<><div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:"#74C69D"}}>{fmtDec(total)} given</span><span style={{color:"#7A8B7A"}}>{fmtDec(givingLog.goal-total)} remaining</span></div><div style={{height:5,background:"#0C1520",borderRadius:4,overflow:"hidden",marginBottom:7}}><div style={{width:`${pct}%`,background:"#74C69D",height:"100%",borderRadius:4}}/></div></>);
        })()}
        <button onClick={()=>{const amt=prompt("Amount given:");const note=prompt("Where/what for?");if(amt&&parseFloat(amt)>0)setGivingLog(p=>({...p,entries:[...(p.entries||[]),{id:Date.now(),amount:parseFloat(amt),note:note||"",date:new Date().toISOString().slice(0,10)}]}));}} style={{...S.btnGhost,width:"100%",padding:7,fontSize:11}}>＋ Log Giving</button>
        {(givingLog.entries||[]).slice(0,5).map(e=><div key={e.id} style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#7A8B7A",marginTop:5}}><span>{e.date} · {e.note||"—"}</span><span style={{color:"#74C69D"}}>{fmtDec(e.amount)}</span></div>)}
      </div>
    </div>
  </>);
}

function DebtView({debts,setDebts,notify}){
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({name:"",balance:"",rate:"",minPayment:"",type:"credit_card"});
  const [method,setMethod]=useState("avalanche");
  const [extra,setExtra]=useState("");
  const fu=(k,v)=>setForm(p=>({...p,[k]:v}));
  const totalDebt=debts.reduce((a,d)=>a+d.balance,0);
  const totalMin=debts.reduce((a,d)=>a+d.minPayment,0);
  const extraAmt=parseFloat(extra)||0;
  const sorted=[...debts].sort((a,b)=>method==="avalanche"?(b.rate-a.rate):(a.balance-b.balance));
  const payoffMonths=(debt,isTarget)=>{
    if(!debt.balance||!debt.minPayment)return null;
    const r=debt.rate/100/12;
    const pmt=debt.minPayment+(isTarget?extraAmt:0);
    if(pmt<=0)return null;
    if(r===0)return Math.ceil(debt.balance/pmt);
    const n=Math.log(pmt/(pmt-r*debt.balance))/Math.log(1+r);
    return isFinite(n)&&n>0?Math.ceil(n):null;
  };
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
      <div style={S.sectionTitle}>📉 Debt Payoff</div>
      <button onClick={()=>setAdding(true)} style={S.btnOutline}>＋ Add Debt</button>
    </div>
    {debts.length>0&&(
      <div style={{...S.card,marginBottom:11,borderColor:"#E07A5F"}}>
        <div style={S.statGrid}>
          <StatCard label="Total Debt"   value={fmtDec(totalDebt)}       color="#E07A5F"/>
          <StatCard label="Min Payments" value={fmtDec(totalMin)+"/mo"}  color="#D4A017"/>
          <StatCard label="# Debts"      value={debts.length}            color="#7A8B7A"/>
        </div>
        <div style={{marginTop:9,borderTop:"1px solid #1E3028",paddingTop:9}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:5}}>
            <div style={S.microLabel}>Strategy</div>
            <div style={{display:"flex",gap:4}}>
              <button onClick={()=>setMethod("avalanche")} style={{...S.periodBtn,...(method==="avalanche"?S.periodBtnActive:{}),fontSize:9}}>⚡ Avalanche</button>
              <button onClick={()=>setMethod("snowball")}  style={{...S.periodBtn,...(method==="snowball" ?S.periodBtnActive:{}),fontSize:9}}>⛄ Snowball</button>
            </div>
          </div>
          <div style={{fontSize:9,color:"#7A8B7A",marginBottom:6}}>{method==="avalanche"?"Highest interest first — saves the most money.":"Smallest balance first — quick wins build momentum."}</div>
          <div style={{display:"flex",alignItems:"center",gap:7}}>
            <span style={{fontSize:10,color:"#7A8B7A",whiteSpace:"nowrap"}}>Extra /mo</span>
            <div style={{position:"relative",flex:1,maxWidth:120}}>
              <span style={S.inputPfx}>$</span>
              <input type="number" value={extra} onChange={e=>setExtra(e.target.value)} style={{...S.input,paddingLeft:20}} placeholder="0"/>
            </div>
          </div>
        </div>
      </div>
    )}
    {adding&&(
      <div style={{...S.card,marginBottom:9,borderColor:"#E07A5F"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <div><div style={S.microLabel}>Name</div><input value={form.name} onChange={e=>fu("name",e.target.value)} style={S.input} placeholder="Chase Visa"/></div>
          <div><div style={S.microLabel}>Type</div>
            <select value={form.type} onChange={e=>fu("type",e.target.value)} style={S.input}>
              <option value="credit_card">💳 Credit Card</option>
              <option value="student">🎓 Student Loan</option>
              <option value="auto">🚗 Auto</option>
              <option value="personal">👤 Personal</option>
              <option value="medical">❤️ Medical</option>
              <option value="other">📦 Other</option>
            </select></div>
          <div><div style={S.microLabel}>Balance $</div><input type="number" value={form.balance} onChange={e=>fu("balance",e.target.value)} style={S.input}/></div>
          <div><div style={S.microLabel}>APR %</div><input type="number" value={form.rate} onChange={e=>fu("rate",e.target.value)} style={S.input}/></div>
          <div><div style={S.microLabel}>Min Payment</div><input type="number" value={form.minPayment} onChange={e=>fu("minPayment",e.target.value)} style={S.input}/></div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <button onClick={()=>{if(!form.name||!form.balance)return;setDebts(p=>[...p,{id:"d_"+Date.now(),...form,balance:parseFloat(form.balance),rate:parseFloat(form.rate)||0,minPayment:parseFloat(form.minPayment)||0}]);setForm({name:"",balance:"",rate:"",minPayment:"",type:"credit_card"});setAdding(false);notify("Debt added ✓");}} style={{...S.btnPrimary,flex:1,padding:7,fontSize:11}}>Add</button>
          <button onClick={()=>setAdding(false)} style={{...S.btnGhost,flex:1,padding:7,fontSize:11}}>Cancel</button>
        </div>
      </div>
    )}
    {debts.length===0?<EmptyState icon="🎉" msg="No debts logged. Add one to track your payoff."/>
      :sorted.map((d,i)=>{
        const isTarget=i===0;
        const months=payoffMonths(d,isTarget);
        const typeIcon={credit_card:"💳",student:"🎓",auto:"🚗",personal:"👤",medical:"❤️",other:"📦"}[d.type]||"📦";
        return(
          <div key={d.id} style={{...S.card,borderColor:isTarget?"#E07A5F":"#1A2A22"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div>
                <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
                  <span>{typeIcon}</span><span style={{fontWeight:"bold",fontSize:12}}>{d.name}</span>
                  {isTarget&&<span style={{background:"#3D1F18",color:"#E07A5F",fontSize:8,padding:"1px 5px",borderRadius:7}}>TARGET</span>}
                </div>
                <div style={{fontSize:9,color:"#7A8B7A",marginTop:2}}>{d.rate}% APR · {fmt(d.minPayment)}/mo{months&&<span style={{color:isTarget?"#E07A5F":"#7A8B7A"}}> · ~{months}mo</span>}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{position:"relative"}}><span style={S.inputPfx}>$</span><input type="number" value={d.balance||""} onChange={e=>setDebts(p=>p.map(x=>x.id===d.id?{...x,balance:parseFloat(e.target.value)||0}:x))} style={{...S.inlineInput,width:85,paddingLeft:18}}/></div>
                <button onClick={()=>setDebts(p=>p.filter(x=>x.id!==d.id))} style={S.iconBtn}>🗑</button>
              </div>
            </div>
          </div>
        );
      })
    }
  </>);
}

function WealthView({netWorth,setNetWorth,windfalls,setWindfalls,debts,savingsGoals,monthIncome,notify}){
  const [addingNW,setAddingNW]=useState(false);
  const [nwForm,setNwForm]=useState({date:new Date().toISOString().slice(0,7),assets:"",liabilities:""});
  const [addingWF,setAddingWF]=useState(false);
  const [wfForm,setWfForm]=useState({amount:"",source:""});
  const addSnap=()=>{
    const a=parseFloat(nwForm.assets)||0,l=parseFloat(nwForm.liabilities)||0;
    setNetWorth(p=>[...p,{id:Date.now(),date:nwForm.date,assets:a,liabilities:l,net:a-l}].sort((a,b)=>a.date<b.date?-1:1));
    setAddingNW(false);notify("Snapshot saved ✓");
  };
  const applyWindfall=(amount)=>{
    const totalDebt=debts.reduce((a,d)=>a+d.balance,0);
    const efGoal=savingsGoals.find(g=>g.name.toLowerCase().includes("emergency"));
    const efNeeded=monthIncome*3-(efGoal?.current||0);
    const steps=[];let rem=amount;
    if(efNeeded>0&&rem>0){const take=Math.min(rem,efNeeded);steps.push({label:"Emergency Fund",amount:take});rem-=take;}
    if(totalDebt>0&&rem>0){const take=Math.min(rem,totalDebt);steps.push({label:"Highest-interest debt",amount:take});rem-=take;}
    if(rem>0)steps.push({label:"Sinking funds / savings",amount:rem});
    return steps;
  };
  const latest=netWorth[netWorth.length-1];
  const prev=netWorth[netWorth.length-2];
  const delta=latest&&prev?latest.net-prev.net:null;
  const wfAmt=parseFloat(wfForm.amount)||0;
  const wfSteps=wfAmt>0?applyWindfall(wfAmt):[];
  return(<>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
      <div style={S.sectionTitle}>📈 Net Worth</div>
      <button onClick={()=>setAddingNW(true)} style={S.btnOutline}>＋ Snapshot</button>
    </div>
    {latest&&(
      <div style={{...S.card,borderColor:"#74C69D",marginBottom:9}}>
        <div style={S.microLabel}>Current · {latest.date}</div>
        <div style={{fontSize:24,fontWeight:"bold",color:latest.net>=0?"#74C69D":"#E07A5F",margin:"2px 0"}}>{fmtDec(latest.net)}</div>
        {delta!==null&&<div style={{fontSize:11,color:delta>=0?"#74C69D":"#E07A5F"}}>{delta>=0?"▲":"▼"} {fmtDec(Math.abs(delta))} vs last</div>}
        <div style={{display:"flex",gap:14,marginTop:6,fontSize:10,color:"#7A8B7A"}}>
          <span>Assets: <span style={{color:"#74C69D"}}>{fmtDec(latest.assets)}</span></span>
          <span>Liabilities: <span style={{color:"#E07A5F"}}>{fmtDec(latest.liabilities)}</span></span>
        </div>
      </div>
    )}
    {addingNW&&(
      <div style={{...S.card,marginBottom:9,borderColor:"#A8C5DA"}}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
          <div><div style={S.microLabel}>Month</div><input type="month" value={nwForm.date} onChange={e=>setNwForm(p=>({...p,date:e.target.value}))} style={S.input}/></div>
          <div><div style={S.microLabel}>Assets $</div><input type="number" value={nwForm.assets} onChange={e=>setNwForm(p=>({...p,assets:e.target.value}))} style={S.input}/></div>
          <div><div style={S.microLabel}>Liabilities $</div><input type="number" value={nwForm.liabilities} onChange={e=>setNwForm(p=>({...p,liabilities:e.target.value}))} style={S.input}/></div>
        </div>
        <div style={{display:"flex",gap:6,marginTop:8}}>
          <button onClick={addSnap} style={{...S.btnPrimary,flex:1,padding:7,fontSize:11}}>Save</button>
          <button onClick={()=>setAddingNW(false)} style={{...S.btnGhost,flex:1,padding:7,fontSize:11}}>Cancel</button>
        </div>
      </div>
    )}
    {netWorth.length>1&&[...netWorth].reverse().slice(0,6).map(s=>(
      <div key={s.id} style={{...S.summaryRow,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:11,color:"#7A8B7A"}}>{s.date}</span>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontWeight:"bold",color:s.net>=0?"#74C69D":"#E07A5F"}}>{fmtDec(s.net)}</span>
          <button onClick={()=>setNetWorth(p=>p.filter(x=>x.id!==s.id))} style={S.iconBtn}>🗑</button>
        </div>
      </div>
    ))}
    {netWorth.length===0&&<EmptyState icon="📊" msg="Log your first snapshot to start tracking."/>}
    <div style={{marginTop:9}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
        <div style={S.sectionTitle}>💰 Windfall Waterfall</div>
        <button onClick={()=>setAddingWF(true)} style={S.btnOutline}>＋ Got Extra $?</button>
      </div>
      <div style={{fontSize:10,color:"#7A8B7A",marginBottom:7}}>Got a bonus, refund, or unexpected cash? Here's exactly where it goes.</div>
      {addingWF&&(
        <div style={{...S.card,borderColor:"#D4A017",marginBottom:8}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
            <div><div style={S.microLabel}>Amount $</div><input type="number" value={wfForm.amount} onChange={e=>setWfForm(p=>({...p,amount:e.target.value}))} style={S.input}/></div>
            <div><div style={S.microLabel}>Source</div><input value={wfForm.source} onChange={e=>setWfForm(p=>({...p,source:e.target.value}))} style={S.input} placeholder="Tax refund"/></div>
          </div>
          {wfSteps.length>0&&(
            <div style={{marginTop:9,background:"#0C1520",borderRadius:6,padding:"9px"}}>
              <div style={{fontSize:10,color:"#D4A017",marginBottom:5}}>💡 Recommended allocation:</div>
              {wfSteps.map((st,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}><span style={{color:"#7A8B7A"}}>→ {st.label}</span><span style={{color:"#E8E0D0",fontWeight:"bold"}}>{fmtDec(st.amount)}</span></div>)}
            </div>
          )}
          <div style={{display:"flex",gap:6,marginTop:8}}>
            <button onClick={()=>{if(!wfForm.amount)return;setWindfalls(p=>[{id:Date.now(),...wfForm,amount:wfAmt,steps:wfSteps},...p]);setWfForm({amount:"",source:""});setAddingWF(false);notify("Windfall logged ✓");}} style={{...S.btnPrimary,flex:1,padding:7,fontSize:11}}>Log</button>
            <button onClick={()=>setAddingWF(false)} style={{...S.btnGhost,flex:1,padding:7,fontSize:11}}>Cancel</button>
          </div>
        </div>
      )}
      {windfalls.slice(0,3).map(wf=>(
        <div key={wf.id} style={{...S.card,marginTop:5}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}><span style={{fontWeight:"bold",fontSize:12,color:"#D4A017"}}>{wf.source||"Windfall"}</span><span style={{color:"#74C69D",fontWeight:"bold"}}>{fmtDec(wf.amount)}</span></div>
          {(wf.steps||[]).map((st,i)=><div key={i} style={{fontSize:10,color:"#7A8B7A",marginTop:1}}>→ {st.label}: {fmtDec(st.amount)}</div>)}
        </div>
      ))}
    </div>
  </>);
}

function PlannerView({income,alloc,categories,spentByCat,debts,sinkingFunds,savingsGoals,monthIncome,riskScore,periodProgress,transactions}){
  const [whatIfCat,setWhatIfCat]=useState("");
  const [whatIfReduce,setWhatIfReduce]=useState("");
  const [whatIfTarget,setWhatIfTarget]=useState("");
  const totalDebt=debts.reduce((a,d)=>a+d.balance,0);
  const efGoal=savingsGoals.find(g=>g.name.toLowerCase().includes("emergency"));
  const insights=[];
  if(riskScore>=65)insights.push({color:"#E07A5F",icon:"⚠️",text:"Budget margin under 10%. Aim for 15–20% buffer to absorb surprises without breaking the plan."});
  if(totalDebt>monthIncome*6)insights.push({color:"#E07A5F",icon:"📉",text:`You carry ${fmtDec(totalDebt)} in debt — over 6 months of income. Every extra dollar should attack this.`});
  if(!efGoal||efGoal.current<1000)insights.push({color:"#E07A5F",icon:"🆘",text:"No $1,000 emergency fund yet. This is Baby Step 1 — do this before everything else."});
  else if(efGoal.current<monthIncome*3)insights.push({color:"#D4A017",icon:"🆘",text:`Emergency fund is ${fmtDec(efGoal.current)}. Target is ${fmtDec(monthIncome*3)} (3 months income). Keep building.`});
  const diningA=parseFloat(alloc["dining"])||0,diningS=spentByCat["dining"]||0;
  if(diningA>0&&diningS/diningA>0.8&&periodProgress<0.6)insights.push({color:"#D4A017",icon:"🍽️",text:"Dining is 80%+ spent before the period is half over. Meal planning could free $100–200/month."});
  if(insights.length===0)insights.push({color:"#74C69D",icon:"✅",text:"Budget is looking healthy. Great discipline!"});
  const BabySteps=[
    {n:1,label:"Save $1,000 starter emergency fund",done:!!(efGoal&&efGoal.current>=1000)},
    {n:2,label:"Pay off all non-mortgage debt (snowball)",done:totalDebt<500},
    {n:3,label:"Build 3–6 month emergency fund",done:!!(efGoal&&efGoal.current>=monthIncome*3)},
    {n:4,label:"Invest 15% of income for retirement",done:false},
    {n:5,label:"Save for children's education",done:false},
    {n:6,label:"Pay off the home early",done:false},
    {n:7,label:"Build wealth and give generously",done:false},
  ];
  const currentStep=BabySteps.findIndex(s=>!s.done);
  const saving=parseFloat(whatIfReduce)||0;
  const targetDebt=debts.find(d=>d.id===whatIfTarget);
  let whatIfResult=null;
  if(saving>0&&targetDebt&&targetDebt.balance>0&&targetDebt.minPayment>0){
    const r=targetDebt.rate/100/12;
    const calc=(pmt)=>r===0?targetDebt.balance/pmt:Math.log(pmt/(pmt-r*targetDebt.balance))/Math.log(1+r);
    const m1=Math.ceil(calc(targetDebt.minPayment)),m2=Math.ceil(calc(targetDebt.minPayment+saving));
    const intSaved=targetDebt.minPayment*m1-targetDebt.balance-(targetDebt.minPayment+saving)*m2+targetDebt.balance;
    if(isFinite(m1)&&isFinite(m2))whatIfResult={monthsNow:m1,monthsNew:m2,saved:m1-m2,intSaved:Math.max(0,intSaved)};
  }
  return(<>
    <div style={{marginBottom:13}}>
      <div style={S.sectionTitle}>💡 Financial Insights</div>
      {insights.map((ins,i)=>(
        <div key={i} style={{...S.card,borderColor:ins.color,marginBottom:6,display:"flex",gap:8,alignItems:"flex-start"}}>
          <span style={{fontSize:17,flexShrink:0}}>{ins.icon}</span>
          <span style={{fontSize:11,color:"#E8E0D0",lineHeight:1.5}}>{ins.text}</span>
        </div>
      ))}
    </div>
    <div style={{marginBottom:13}}>
      <div style={S.sectionTitle}>👶 Financial Baby Steps</div>
      {BabySteps.map((s,i)=>{
        const isCurrent=i===currentStep;
        return(
          <div key={s.n} style={{...S.card,marginBottom:4,padding:"8px 11px",borderColor:s.done?"#2D6A4F":isCurrent?"#D4A017":"#1A2A22",opacity:!s.done&&!isCurrent&&i>currentStep?.4:1}}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:22,height:22,borderRadius:"50%",flexShrink:0,background:s.done?"#2D6A4F":isCurrent?"#D4A017":"#1E3028",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:"bold",color:s.done?"#fff":isCurrent?"#000":"#555"}}>{s.done?"✓":s.n}</div>
              <div>
                <div style={{fontSize:11,color:s.done?"#74C69D":isCurrent?"#D4A017":"#7A8B7A",fontWeight:isCurrent?"bold":"normal"}}>{s.label}</div>
                {isCurrent&&<div style={{fontSize:9,color:"#6A5010",marginTop:1}}>← You are here</div>}
              </div>
            </div>
          </div>
        );
      })}
    </div>
    <div style={{marginBottom:13}}>
      <div style={S.sectionTitle}>🔮 What-If Simulator</div>
      <div style={S.card}>
        <div style={{fontSize:11,color:"#7A8B7A",marginBottom:9}}>If I cut a category and put that money toward a debt — how much faster do I pay it off?</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
          <div><div style={S.microLabel}>Cut from</div>
            <select value={whatIfCat} onChange={e=>{setWhatIfCat(e.target.value);setWhatIfReduce(Math.round((parseFloat(alloc[e.target.value])||0)*0.25)||"");}} style={S.input}>
              <option value="">Category...</option>
              {categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select></div>
          <div><div style={S.microLabel}>Save $/period</div><input type="number" value={whatIfReduce} onChange={e=>setWhatIfReduce(e.target.value)} style={S.input} placeholder="0"/></div>
          <div style={{gridColumn:"1/-1"}}><div style={S.microLabel}>Apply to debt</div>
            <select value={whatIfTarget} onChange={e=>setWhatIfTarget(e.target.value)} style={S.input}>
              <option value="">Pick debt...</option>
              {debts.map(d=><option key={d.id} value={d.id}>{d.name} — {fmtDec(d.balance)}</option>)}
            </select></div>
        </div>
        {whatIfResult&&(
          <div style={{marginTop:11,background:"#0C1520",borderRadius:6,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:10,color:"#7A8B7A",marginBottom:4}}>Payoff changes from</div>
            <div style={{fontSize:16,fontWeight:"bold"}}><span style={{color:"#E07A5F"}}>{whatIfResult.monthsNow} mo</span><span style={{color:"#555",margin:"0 7px"}}>→</span><span style={{color:"#74C69D"}}>{whatIfResult.monthsNew} mo</span></div>
            {whatIfResult.saved>0&&<div style={{color:"#D4A017",fontSize:11,marginTop:4}}>🎉 {whatIfResult.saved} months faster · ~{fmtDec(whatIfResult.intSaved)} interest saved</div>}
          </div>
        )}
        {debts.length===0&&<div style={{fontSize:10,color:"#555",marginTop:6}}>Add debts in the Debt tab to use the simulator.</div>}
      </div>
    </div>
  </>);
}

function SyncModal({householdId,deviceName,syncEnabled,lastSync,syncStatus,onSetup,onJoin,onDisable,onClose}){
  const [mode,setMode]=useState(syncEnabled?"active":"choose");
  const [hid,setHid]=useState("");
  const [dname,setDname]=useState(deviceName||"");
  const newId=useRef(genHID());
  if(mode==="active")return(
    <Modal title="🏠 Household Sync" onClose={onClose}>
      <div style={{...S.card,borderColor:"#74C69D",marginBottom:11}}>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:5}}>
          <span style={{width:7,height:7,borderRadius:"50%",background:"#74C69D",display:"inline-block"}}/>
          <span style={{color:"#74C69D",fontWeight:"bold",fontSize:12}}>Live Sync Active</span>
        </div>
        <div style={S.microLabel}>Household Code</div>
        <div style={{fontSize:26,fontWeight:"bold",letterSpacing:6,color:"#F0EAD6",margin:"3px 0 7px",fontFamily:"monospace"}}>{householdId}</div>
        <div style={{fontSize:10,color:"#7A8B7A"}}>Share this code with your wife. She taps Sync → Join → enters this code.</div>
        {lastSync&&<div style={{fontSize:9,color:"#555",marginTop:5}}>Last sync: {new Date(lastSync).toLocaleTimeString()}</div>}
      </div>
      <div style={{fontSize:10,color:"#7A8B7A",marginBottom:13}}>Changes sync every 6 seconds. Both devices see the same budget live.</div>
      <button onClick={onDisable} style={{...S.btnGhost,width:"100%",padding:8,fontSize:11,borderColor:"#E07A5F",color:"#E07A5F"}}>Disable Sync</button>
    </Modal>
  );
  if(mode==="choose")return(
    <Modal title="🏠 Household Sync" onClose={onClose}>
      <p style={{color:"#7A8B7A",fontSize:11,marginBottom:13}}>Sync your budget with your wife's device so you both see the same data live — no manual sharing needed.</p>
      <button onClick={()=>setMode("create")} style={{...S.btnPrimary,width:"100%",padding:11,marginBottom:8,fontSize:13}}>🏠 Create New Household</button>
      <button onClick={()=>setMode("join")} style={{...S.btnGhost,width:"100%",padding:11,fontSize:13}}>🔗 Join Existing Household</button>
    </Modal>
  );
  if(mode==="create")return(
    <Modal title="Create Household" onClose={onClose}>
      <p style={{color:"#7A8B7A",fontSize:11,marginBottom:11}}>Your household code is generated below. Share it with your wife so she can join.</p>
      <div style={{...S.card,borderColor:"#74C69D",textAlign:"center",marginBottom:11}}>
        <div style={S.microLabel}>Your Code</div>
        <div style={{fontSize:28,fontWeight:"bold",letterSpacing:8,color:"#74C69D",fontFamily:"monospace",margin:"5px 0"}}>{newId.current}</div>
      </div>
      <div style={S.microLabel}>Your Device Name</div>
      <input value={dname} onChange={e=>setDname(e.target.value)} style={{...S.input,marginBottom:11}} placeholder="e.g. Lee's Phone"/>
      <button onClick={()=>{if(dname.trim())onSetup(newId.current,dname.trim());}} style={{...S.btnPrimary,width:"100%",padding:10,fontSize:13}}>Activate Sync</button>
    </Modal>
  );
  if(mode==="join")return(
    <Modal title="Join Household" onClose={onClose}>
      <p style={{color:"#7A8B7A",fontSize:11,marginBottom:11}}>Enter the household code from your husband's phone.</p>
      <div style={S.microLabel}>Household Code</div>
      <input value={hid} onChange={e=>setHid(e.target.value.toUpperCase().slice(0,6))} style={{...S.input,fontSize:20,letterSpacing:6,fontFamily:"monospace",textAlign:"center",marginBottom:9}} placeholder="ABC123"/>
      <div style={S.microLabel}>Your Device Name</div>
      <input value={dname} onChange={e=>setDname(e.target.value)} style={{...S.input,marginBottom:11}} placeholder="e.g. Wife's Phone"/>
      <button onClick={()=>{if(hid.length===6&&dname.trim())onJoin(hid,dname.trim());}} style={{...S.btnPrimary,width:"100%",padding:10,fontSize:13}}>Join &amp; Sync</button>
    </Modal>
  );
  return null;
}

function IncomeModal({income,periodLabel,onSave,onClose}){
  const [val,setVal]=useState(income||"");
  return(
    <Modal title={`Paycheck · ${periodLabel}`} onClose={onClose}>
      <div style={S.microLabel}>Take-home amount</div>
      <div style={{position:"relative"}}>
        <span style={S.inputPfx}>$</span>
        <input autoFocus type="number" value={val} onChange={e=>setVal(e.target.value)}
          onKeyDown={e=>e.key==="Enter"&&onSave(val)} style={{...S.input,paddingLeft:22}} placeholder="3200.00"/>
      </div>
      <button onClick={()=>onSave(val)} style={{...S.btnPrimary,marginTop:10,width:"100%"}}>Save Paycheck</button>
    </Modal>
  );
}

function AddTxModal({categories,periodLabel,onAdd,onClose}){
  const [fm,setFm]=useState({desc:"",amount:"",catId:categories[0]?.id||"misc",date:new Date().toISOString().slice(0,10),person:"both",memo:"",recurring:false,splits:[]});
  const [splitting,setSplitting]=useState(false);
  const [splits,setSplits]=useState([{catId:categories[0]?.id||"misc",amount:"",label:""}]);
  const u=(k,v)=>setFm(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!fm.desc.trim()||!fm.amount)return;
    const tx={...fm,amount:parseFloat(fm.amount)};
    if(splitting&&splits.filter(s=>s.amount).length>0)tx.splits=splits.filter(s=>s.amount).map(s=>({...s,amount:parseFloat(s.amount)}));
    onAdd(tx);
  };
  return(
    <Modal title={`Log Transaction · ${periodLabel}`} onClose={onClose}>
      <div style={S.microLabel}>Description</div>
      <input value={fm.desc} onChange={e=>u("desc",e.target.value)} style={S.input} placeholder="e.g. Target run"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginTop:7}}>
        <div><div style={S.microLabel}>Amount</div><div style={{position:"relative"}}><span style={S.inputPfx}>$</span><input type="number" value={fm.amount} onChange={e=>u("amount",e.target.value)} style={{...S.input,paddingLeft:22}}/></div></div>
        <div><div style={S.microLabel}>Date</div><input type="date" value={fm.date} onChange={e=>u("date",e.target.value)} style={S.input}/></div>
      </div>
      {!splitting&&<div style={{marginTop:7}}><div style={S.microLabel}>Category</div>
        <select value={fm.catId} onChange={e=>u("catId",e.target.value)} style={S.input}>
          {GROUPS.map(g=><optgroup key={g} label={`── ${g} ──`}>{categories.filter(c=>c.group===g).map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</optgroup>)}
        </select></div>}
      {splitting&&(
        <div style={{marginTop:7}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
            <div style={S.microLabel}>Split Transaction</div>
            <span style={{fontSize:9,color:Math.abs(splits.reduce((a,s)=>a+(parseFloat(s.amount)||0),0)-(parseFloat(fm.amount)||0))<0.01?"#74C69D":"#E07A5F"}}>
              {fmtDec(splits.reduce((a,s)=>a+(parseFloat(s.amount)||0),0))} / {fmtDec(parseFloat(fm.amount)||0)}
            </span>
          </div>
          {splits.map((sp,i)=>(
            <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 75px 95px 20px",gap:4,marginBottom:4}}>
              <input value={sp.label} onChange={e=>setSplits(p=>p.map((s,j)=>j===i?{...s,label:e.target.value}:s))} style={S.inlineInput} placeholder="Label"/>
              <div style={{position:"relative"}}><span style={S.inputPfx}>$</span><input type="number" value={sp.amount} onChange={e=>setSplits(p=>p.map((s,j)=>j===i?{...s,amount:e.target.value}:s))} style={{...S.inlineInput,paddingLeft:16,width:"100%"}}/></div>
              <select value={sp.catId} onChange={e=>setSplits(p=>p.map((s,j)=>j===i?{...s,catId:e.target.value}:s))} style={S.inlineInput}>{categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select>
              <button onClick={()=>setSplits(p=>p.filter((_,j)=>j!==i))} style={{...S.iconBtn,fontSize:11}}>✕</button>
            </div>
          ))}
          <button onClick={()=>setSplits(p=>[...p,{catId:categories[0]?.id,amount:"",label:""}])} style={{...S.btnGhost,width:"100%",padding:5,fontSize:10,marginTop:2}}>＋ Add Split</button>
        </div>
      )}
      <div style={{marginTop:7}}><div style={S.microLabel}>Who spent it?</div>
        <select value={fm.person} onChange={e=>u("person",e.target.value)} style={S.input}>
          <option value="both">👥 Joint / Both</option><option value="me">🙋 Me</option><option value="spouse">💑 Spouse</option>
        </select></div>
      <div style={{marginTop:7}}><div style={S.microLabel}>Memo (optional)</div><input value={fm.memo} onChange={e=>u("memo",e.target.value)} style={S.input} placeholder="Optional note..."/></div>
      <div style={{display:"flex",gap:11,marginTop:8,alignItems:"center"}}>
        <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}><input type="checkbox" checked={fm.recurring} onChange={e=>u("recurring",e.target.checked)} style={{accentColor:"#74C69D"}}/><span style={{fontSize:10,color:"#7A8B7A"}}>🔁 Recurring</span></label>
        <label style={{display:"flex",alignItems:"center",gap:5,cursor:"pointer"}}><input type="checkbox" checked={splitting} onChange={e=>setSplitting(e.target.checked)} style={{accentColor:"#74C69D"}}/><span style={{fontSize:10,color:"#7A8B7A"}}>🏷️ Split</span></label>
      </div>
      <button onClick={submit} style={{...S.btnPrimary,marginTop:10,width:"100%"}}>Add Transaction</button>
    </Modal>
  );
}

function AddCatModal({onAdd,onClose}){
  const [label,setLabel]=useState(""),[ ic,setIc]=useState("📌"),[group,setGroup]=useState("Living");
  const QI=["📌","🏋️","✈️","🐾","🎮","📚","🍕","🎵","🏕️","💊","🎓","🧹","🔧","🌱","💻","🎁","🍼","🐕","⛪","🏊","🎭","🍷","☕"];
  return(
    <Modal title="Add Category" onClose={onClose}>
      <div style={{display:"flex",flexWrap:"wrap",gap:3,marginBottom:8}}>
        {QI.map(i=><button key={i} onClick={()=>setIc(i)} style={{fontSize:15,padding:"3px",border:`2px solid ${i===ic?"#74C69D":"#1E3028"}`,borderRadius:5,background:"#141F2A",cursor:"pointer"}}>{i}</button>)}
        <input value={ic} onChange={e=>setIc(e.target.value)} style={{...S.input,width:38,textAlign:"center",padding:"2px"}} maxLength={2}/>
      </div>
      <div style={S.microLabel}>Name</div><input value={label} onChange={e=>setLabel(e.target.value)} style={S.input} placeholder="e.g. Date Night"/>
      <div style={{...S.microLabel,marginTop:7}}>Group</div>
      <select value={group} onChange={e=>setGroup(e.target.value)} style={S.input}><option>Bills</option><option>Living</option><option>Goals</option></select>
      <button onClick={()=>{if(label.trim())onAdd(label.trim(),ic,group);}} style={{...S.btnPrimary,marginTop:10,width:"100%"}}>Add Category</button>
    </Modal>
  );
}

function AddRecurringModal({categories,recurringBills,onSave,onClose}){
  const [list,setList]=useState([...recurringBills]);
  const [fm,setFm]=useState({catId:categories[0]?.id||"misc",amount:"",period:0});
  const add=()=>{
    if(!fm.amount)return;
    setList(p=>[...p.filter(r=>!(r.catId===fm.catId&&r.period===Number(fm.period))),{id:"rec_"+Date.now(),catId:fm.catId,amount:parseFloat(fm.amount),period:Number(fm.period)}]);
    setFm(p=>({...p,amount:""}));
  };
  return(
    <Modal title="🔁 Recurring Bills" onClose={onClose}>
      <p style={{color:"#7A8B7A",fontSize:10,marginBottom:8}}>Auto-fill allocations when a paycheck is entered.</p>
      <div style={{display:"grid",gridTemplateColumns:"1fr 70px 70px",gap:5,marginBottom:8}}>
        <select value={fm.catId} onChange={e=>setFm(p=>({...p,catId:e.target.value}))} style={S.input}>{categories.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select>
        <div style={{position:"relative"}}><span style={S.inputPfx}>$</span><input type="number" value={fm.amount} onChange={e=>setFm(p=>({...p,amount:e.target.value}))} style={{...S.input,paddingLeft:18}} placeholder="Amt"/></div>
        <select value={fm.period} onChange={e=>setFm(p=>({...p,period:e.target.value}))} style={S.input}><option value={0}>Both</option><option value={1}>1–15</option><option value={2}>16–End</option></select>
      </div>
      <button onClick={add} style={{...S.btnPrimary,width:"100%",padding:7,fontSize:11,marginBottom:10}}>＋ Add</button>
      {list.length===0?<div style={{color:"#555",textAlign:"center",fontSize:11,padding:5}}>None yet.</div>
        :list.map(r=>{
          const cat=categories.find(c=>c.id===r.catId)||{label:r.catId,icon:"📦"};
          return(
            <div key={r.id} style={{...S.summaryRow,display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
              <div><span style={{fontSize:11}}>{cat.icon} {cat.label}</span><span style={{fontSize:9,color:"#7A8B7A",marginLeft:6}}>{r.period===0?"Both":r.period===1?"1–15":"16–End"}</span></div>
              <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{color:"#E8E0D0",fontWeight:"bold",fontSize:11}}>{fmtDec(r.amount)}</span><button onClick={()=>setList(p=>p.filter(x=>x.id!==r.id))} style={S.iconBtn}>🗑</button></div>
            </div>
          );
        })
      }
      <button onClick={()=>onSave(list)} style={{...S.btnPrimary,width:"100%",marginTop:8,padding:9}}>Save</button>
    </Modal>
  );
}

function Modal({title,onClose,children}){
  return(
    <div style={S.overlay} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={S.modalBox}>
        <div style={S.modalHeader}><span style={{fontWeight:"bold",fontSize:13}}>{title}</span><button onClick={onClose} style={S.closeBtn}>✕</button></div>
        {children}
      </div>
    </div>
  );
}
function StatCard({label,value,color}){return(<div style={S.statCard}><div style={{fontSize:13,fontWeight:"bold",color}}>{value}</div><div style={{fontSize:8,color:"#7A8B7A",marginTop:2}}>{label}</div></div>);}
function EmptyState({icon,msg}){return(<div style={{textAlign:"center",color:"#555",padding:"32px 0"}}><div style={{fontSize:34}}>{icon}</div><div style={{marginTop:6,fontSize:11}}>{msg}</div></div>);}
function Toast({msg,type}){return(<div style={{position:"fixed",top:62,left:"50%",transform:"translateX(-50%)",background:type==="err"?"#B5451B":"#2D6A4F",color:"#fff",padding:"7px 18px",borderRadius:7,zIndex:300,fontSize:11,boxShadow:"0 4px 20px rgba(0,0,0,.5)",whiteSpace:"nowrap"}}>{msg}</div>);}


ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
